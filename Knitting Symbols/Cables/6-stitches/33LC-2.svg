<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100">
    <defs>
        <clipPath id="cut">
            <polygon points="0,100 0,0 410,100" />
            <polygon points="600,0 600,100 190,0" />
        </clipPath>
    </defs>
    <!-- Left -->
    <path d="M10 10 L410 90" stroke="black" stroke-width="10px" stroke-linecap="round" />
    <path d="M100 10 L500 90" stroke="black" stroke-width="10px" stroke-linecap="round" />
    <path d="M190 10  L590 90 " stroke="black" stroke-width="10px" stroke-linecap="round" />
    <!-- Right -->
    <path d="M10 90 L410 10" stroke="black" stroke-width="10px" stroke-linecap="round" clip-path="url(#cut)" />
    <path d="M100 90 L500 10" stroke="black" stroke-width="10px" stroke-linecap="round" clip-path="url(#cut)" />
    <path d="M190 90 L590 10" stroke="black" stroke-width="10px" stroke-linecap="round" clip-path="url(#cut)" />
</svg>