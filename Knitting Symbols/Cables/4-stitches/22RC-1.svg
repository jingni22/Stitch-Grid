<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
    <defs>
        <clipPath id="cut">
            <polygon points="0,100 0,0 200,0" />
            <polygon points="400,0 400,100 200,100" />
        </clipPath>
    </defs>
    <!-- Right -->
    <path d="M10 90 L200 10" stroke="black" stroke-width="10px" stroke-linecap="round" />
    <path d="M200 90 L390 10" stroke="black" stroke-width="10px" stroke-linecap="round" />
    <!-- Left -->
    <path d="M200 90 L10 10" stroke="black" stroke-width="10px" stroke-linecap="round" clip-path="url(#cut)" />
    <path d="M200 10 L390 90" stroke="black" stroke-width="10px" stroke-linecap="round" clip-path="url(#cut)" />
</svg>