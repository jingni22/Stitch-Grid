<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 10">
    <defs>
        <clipPath id="cut">
            <polygon points="0,10 0,0 20,0" />
            <polygon points="40,0 40,10 20,10" />
        </clipPath>
    </defs>
    <!-- Right -->
    <path d="M1 9 L20 1" stroke="black" stroke-width="1px" stroke-linecap="round" />
    <path d="M20 9 L39 1" stroke="black" stroke-width="1px" stroke-linecap="round" />
    <!-- Left -->
    <path d="M20 9 L1 1" stroke="black" stroke-width="1px" stroke-linecap="round" clip-path="url(#cut)"/>
    <path d="M20 1 L39 9" stroke="black" stroke-width="1px" stroke-linecap="round" clip-path="url(#cut)"/>
</svg>