<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100">
    <defs>
        <clipPath id="cut">
            <polygon points="0,100 0,0 540,100" />
            <polygon points="800,0 800,100 260,0" />
        </clipPath>
    </defs>
    <!-- Left -->
    <path d="M10 10 L520 90" stroke="black" stroke-width="10px" stroke-linecap="round" />
    <path d="M100 10 L610 90" stroke="black" stroke-width="10px" stroke-linecap="round" />
    <path d="M190 10 L700 90" stroke="black" stroke-width="10px" stroke-linecap="round" />
    <path d="M280 10 L790 90" stroke="black" stroke-width="10px" stroke-linecap="round" />
    <!-- Right -->
    <path d="M10 90 L520 10" stroke="black" stroke-width="10px" stroke-linecap="round" clip-path="url(#cut)" />
    <path d="M100 90 L610 10" stroke="black" stroke-width="10px" stroke-linecap="round" clip-path="url(#cut)" />
    <path d="M190 90 L700 10" stroke="black" stroke-width="10px" stroke-linecap="round" clip-path="url(#cut)" />
    <path d="M280 90 L790 10" stroke="black" stroke-width="10px" stroke-linecap="round" clip-path="url(#cut)" />
</svg>